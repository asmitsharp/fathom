databases:
  # 1. PostgreSQL Database
  - name: fathom-db
    plan: free
    postgresMajorVersion: "15"

services:
  # 2. Go Backend Web Service
  - type: web
    name: fathom-api
    plan: free
    env: go
    rootDir: backend
    buildCommand: go build -o server ./cmd/server
    startCommand: ./server
    envVars:
      - key: PORT
        value: "8080"
      - key: DATABASE_URL
        fromDatabase:
          name: fathom-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: DB_SSLMODE
        value: disable
      - key: FRONTEND_URL
        value: https://fathom-frontend.onrender.com

  # 3. React Frontend Static Site
  - type: web
    name: fathom-frontend
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://fathom-api.onrender.com/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
